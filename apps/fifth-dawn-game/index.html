<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#07111f" />
    <meta name="color-scheme" content="dark" />
    <title>Deep Stake</title>
    <meta
      name="description"
      content="Deep Stake standalone life sim game client"
    />
  </head>
  <body style="margin: 0; background: #07111f; color: #f8fafc;">
    <div
      id="boot-fallback"
      style="
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, #07111f 0%, #0f172a 100%);
        color: #e2f7e2;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      "
    >
      <div style="max-width: 520px; padding: 32px; text-align: center;">
        <div style="font-size: 12px; letter-spacing: 0.35em; text-transform: uppercase; color: #8dd3c7;">
          Deep Stake
        </div>
        <h1 style="margin: 14px 0 0; font-size: 28px;">게임 화면을 준비하고 있습니다</h1>
        <p style="margin: 14px 0 0; color: #d7e6f3; line-height: 1.6;">
          앱이 열렸지만 메인 세계가 아직 올라오지 않았습니다. 아래 비상 월드와 상태 문구가
          보이면 앱 셸은 정상적으로 살아 있는 상태입니다.
        </p>
        <div
          id="boot-fallback-status"
          style="margin-top: 18px; font-size: 13px; line-height: 1.6; color: #8dd3c7; white-space: pre-wrap;"
        >
          부트 진단을 준비하고 있습니다.
        </div>
        <div
          id="boot-fallback-world"
          style="
            margin-top: 24px;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 24px;
            padding: 18px;
            background: rgba(2, 8, 18, 0.45);
          "
        >
          <div style="font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: #9fd7c3;">
            Emergency Mobile World
          </div>
          <canvas
            id="boot-fallback-canvas"
            width="280"
            height="280"
            style="margin-top: 14px; width: 100%; max-width: 280px; border-radius: 18px; background: #091324; box-shadow: 0 0 0 1px rgba(255,255,255,0.08);"
          ></canvas>
          <div style="margin-top: 12px; color: #d7e6f3; font-size: 13px; line-height: 1.6;">
            정식 세계가 로드되지 않더라도 여기서 최소한 이동과 화면 반응을 확인할 수 있습니다.
          </div>
          <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 220px; margin: 16px auto 0;">
            <div></div>
            <button data-move="up" style="padding: 10px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.06); color: #f8fafc;">위</button>
            <div></div>
            <button data-move="left" style="padding: 10px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.06); color: #f8fafc;">왼쪽</button>
            <button data-move="down" style="padding: 10px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.06); color: #f8fafc;">아래</button>
            <button data-move="right" style="padding: 10px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.06); color: #f8fafc;">오른쪽</button>
          </div>
          <div id="boot-fallback-world-status" style="margin-top: 14px; font-size: 12px; color: #9fd7c3;">
            북쪽 광장과 새벽 정원을 둘러보세요.
          </div>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script>
      (function () {
        var node = document.getElementById("boot-fallback-status");
        var worldStatus = document.getElementById("boot-fallback-world-status");
        var canvas = document.getElementById("boot-fallback-canvas");
        var ctx = canvas ? canvas.getContext("2d") : null;
        var player = { x: 2, y: 2 };
        var world = [
          ["water", "water", "path", "grass", "grass", "grass", "grass"],
          ["water", "path", "path", "garden", "garden", "grass", "grass"],
          ["path", "path", "home", "path", "plaza", "plaza", "grass"],
          ["grass", "garden", "path", "path", "path", "plaza", "gate"],
          ["grass", "grass", "grass", "garden", "path", "stone", "stone"],
          ["grass", "tree", "grass", "grass", "path", "stone", "north"],
          ["grass", "grass", "grass", "grass", "path", "path", "path"]
        ];

        function write(message) {
          if (node) node.textContent = message;
        }

        function describe(tile) {
          switch (tile) {
            case "home":
              return "복구 거주지 근처입니다.";
            case "garden":
              return "새벽 정원 구역입니다.";
            case "plaza":
              return "광장 중앙부에 서 있습니다.";
            case "gate":
              return "관문 유적이 남아 있습니다.";
            case "north":
              return "북부 개척지로 이어지는 길목입니다.";
            case "water":
              return "물이 깊어 더는 갈 수 없습니다.";
            case "stone":
              return "광물과 자재가 묻힌 지대입니다.";
            default:
              return "복구 가능한 초원 지대입니다.";
          }
        }

        function color(tile) {
          switch (tile) {
            case "water":
              return "#1d4ed8";
            case "path":
              return "#9ca3af";
            case "garden":
              return "#14532d";
            case "plaza":
              return "#6b7280";
            case "home":
              return "#b45309";
            case "gate":
              return "#7c3aed";
            case "north":
              return "#0f766e";
            case "stone":
              return "#475569";
            default:
              return "#166534";
          }
        }

        function drawWorld() {
          if (!ctx) return;
          var size = 40;
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          for (var y = 0; y < world.length; y += 1) {
            for (var x = 0; x < world[y].length; x += 1) {
              ctx.fillStyle = color(world[y][x]);
              ctx.fillRect(x * size, y * size, size - 2, size - 2);
            }
          }
          ctx.fillStyle = "#f8fafc";
          ctx.beginPath();
          ctx.arc(player.x * size + size / 2 - 1, player.y * size + size / 2 - 1, 10, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#8dd3c7";
          ctx.font = "12px sans-serif";
          ctx.fillText("DS", player.x * size + 10, player.y * size + 24);
          if (worldStatus) {
            worldStatus.textContent = describe(world[player.y][player.x]);
          }
        }

        function move(dx, dy) {
          var nextX = Math.max(0, Math.min(world[0].length - 1, player.x + dx));
          var nextY = Math.max(0, Math.min(world.length - 1, player.y + dy));
          if (world[nextY][nextX] === "water") {
            if (worldStatus) {
              worldStatus.textContent = "물이 깊어 더는 이동할 수 없습니다.";
            }
            return;
          }
          player.x = nextX;
          player.y = nextY;
          drawWorld();
        }

        write("HTML은 로드되었습니다. JavaScript 앱 부팅을 기다리는 중입니다.");
        drawWorld();
        document.querySelectorAll("[data-move]").forEach(function (button) {
          button.addEventListener("click", function () {
            var direction = button.getAttribute("data-move");
            if (direction === "up") move(0, -1);
            if (direction === "down") move(0, 1);
            if (direction === "left") move(-1, 0);
            if (direction === "right") move(1, 0);
          });
        });
        window.addEventListener("error", function (event) {
          write("JS 오류: " + (event.message || "알 수 없는 오류"));
        });
        window.addEventListener("unhandledrejection", function (event) {
          var reason = event.reason;
          write("비동기 오류: " + (reason && reason.message ? reason.message : String(reason)));
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
